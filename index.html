<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Magic 8-Ball</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%23101014'/%3E%3Ccircle cx='32' cy='32' r='15' fill='%23f2f0ea'/%3E%3Ctext x='32' y='39' font-size='18' font-weight='bold' text-anchor='middle' font-family='sans-serif'%3E8%3C/text%3E%3C/svg%3E" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: radial-gradient(ellipse at 50% 32%, #36266b 0%, #1a1140 46%, #090616 100%);
    font-family: 'Inter', system-ui, sans-serif;
    color: #cfc4f5;
    user-select: none;
    -webkit-user-select: none;
  }
  #scene { position: fixed; inset: 0; display: block; cursor: pointer; }
  #scene:focus-visible {
    outline: 3px solid #ffe9b0;
    outline-offset: -7px;
  }

  #ui {
    position: fixed; inset: 0; pointer-events: none;
    display: flex; flex-direction: column; justify-content: space-between;
    padding: 4.5vh 20px 5vh;
  }
  header { text-align: center; }
  h1 {
    font-family: 'Cinzel', serif; font-weight: 700;
    font-size: clamp(20px, 3.4vw, 34px);
    letter-spacing: 0.42em; text-indent: 0.42em;
    color: #e6dcff;
    text-shadow: 0 0 24px rgba(158, 130, 255, 0.55), 0 0 60px rgba(120, 90, 255, 0.3);
  }
  .sub {
    margin-top: 10px; font-size: clamp(11px, 1.3vw, 13px);
    letter-spacing: 0.28em; text-indent: 0.28em; text-transform: uppercase;
    color: #8578c0;
  }
  footer { text-align: center; min-height: 110px; display: flex; flex-direction: column; justify-content: flex-end; gap: 16px; }
  #caption {
    font-family: 'Cinzel', serif; font-weight: 500;
    font-size: clamp(18px, 2.6vw, 28px);
    letter-spacing: 0.14em;
    color: #ffe9b0;
    text-shadow: 0 0 18px rgba(255, 214, 130, 0.5);
    opacity: 0; transform: translateY(12px);
    transition: opacity 0.6s ease, transform 0.6s ease;
    min-height: 1.4em;
  }
  #caption.show { opacity: 1; transform: translateY(0); }
  #hint {
    font-size: clamp(11px, 1.3vw, 13px);
    letter-spacing: 0.22em; text-transform: uppercase;
    color: #6f639e;
    transition: opacity 0.6s ease;
  }

  /* loading / error overlay */
  #overlay {
    position: fixed; inset: 0; z-index: 10;
    background: radial-gradient(ellipse at 50% 32%, #36266b 0%, #1a1140 46%, #090616 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 26px;
    transition: opacity 0.8s ease;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  .ring {
    width: 54px; height: 54px; border-radius: 50%;
    border: 2px solid rgba(158, 130, 255, 0.2);
    border-top-color: #b9a5ff;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #overlay p { font-size: 12px; letter-spacing: 0.3em; text-transform: uppercase; color: #8578c0; }
</style>
</head>
<body>

<canvas id="scene" tabindex="0" role="button"
        aria-label="Ask the Magic 8-Ball"
        aria-describedby="hint"
        aria-keyshortcuts="Enter Space"></canvas>

<div id="ui">
  <header>
    <h1>MAGIC 8-BALL</h1>
    <div class="sub">Mystic 8</div>
  </header>
  <footer>
    <div id="caption"></div>
    <div id="hint">
      <div>Think of a yes-or-no question &mdash;</div>
      <div>then click the ball or press Enter</div>
      <div>for entertainment purposes only</div>
    </div>
  </footer>
</div>

<div id="overlay">
  <div class="ring"></div>
  <p id="overlay-text">Consulting the spirits</p>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

/* ------------------------------------------------ answers */
const ANSWERS = [
  'Yes', 'No', 'Certainly', 'Definitely', 'Absolutely not',
  'Most likely', 'Very doubtful', 'It is certain', 'Ask again later',
  'Reply hazy', 'Signs point to yes', "Don't count on it",
  'Outlook good', 'My reply is no', 'Without a doubt', 'Cannot predict now'
];

/* ------------------------------------------------ tiny tween engine */
const tweens = [];
const linear = k => k;
const easeInOutCubic = k => k < 0.5 ? 4*k*k*k : 1 - Math.pow(-2*k + 2, 3) / 2;
const easeOutCubic = k => 1 - Math.pow(1 - k, 3);
const easeOutBack = k => { const c1 = 1.70158, c3 = c1 + 1; return 1 + c3*Math.pow(k-1,3) + c1*Math.pow(k-1,2); };
function tw(dur, ease, onUpdate, delay = 0) {
  return new Promise(res => tweens.push({ t: -delay, dur, ease, onUpdate, res }));
}
function stepTweens(dt) {
  for (let i = tweens.length - 1; i >= 0; i--) {
    const w = tweens[i];
    w.t += dt;
    const k = Math.min(Math.max(w.t / w.dur, 0), 1);
    if (w.t >= 0) w.onUpdate(w.ease(k));
    if (k >= 1) { tweens.splice(i, 1); w.res(); }
  }
}

/* ------------------------------------------------ renderer / scene */
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 0);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 100);
const CAM_Y = 0.62, CAM_Z = 4.35;
camera.position.set(0, CAM_Y, CAM_Z);
camera.lookAt(0, 0, 0);

const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

/* lights */
const key = new THREE.DirectionalLight(0xffffff, 2.2);
key.position.set(3, 4.5, 2.5);
key.castShadow = true;
key.shadow.mapSize.set(1024, 1024);
key.shadow.camera.left = key.shadow.camera.bottom = -2.2;
key.shadow.camera.right = key.shadow.camera.top = 2.2;
key.shadow.radius = 6;
scene.add(key);
const rim = new THREE.DirectionalLight(0x8a7bff, 1.4);
rim.position.set(-3.5, 1.5, -3);
scene.add(rim);
scene.add(new THREE.HemisphereLight(0x8a7bff, 0x0a0718, 0.4));

/* soft ground shadow */
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(12, 12),
  new THREE.ShadowMaterial({ opacity: 0.42 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -1.25;
ground.receiveShadow = true;
scene.add(ground);

/* drifting sparkle particles */
const P = 160;
const pGeo = new THREE.BufferGeometry();
const pPos = new Float32Array(P * 3);
for (let i = 0; i < P; i++) {
  pPos[i*3]   = (Math.random() - 0.5) * 9;
  pPos[i*3+1] = (Math.random() - 0.5) * 6;
  pPos[i*3+2] = -1.5 - Math.random() * 4;
}
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
const particles = new THREE.Points(pGeo, new THREE.PointsMaterial({
  color: 0x9d8cff, size: 0.022, transparent: true, opacity: 0.55,
  blending: THREE.AdditiveBlending, depthWrite: false
}));
scene.add(particles);

/* ------------------------------------------------ answer text texture */
const textCanvas = document.createElement('canvas');
textCanvas.width = textCanvas.height = 512;
const tctx = textCanvas.getContext('2d');
const capTex = new THREE.CanvasTexture(textCanvas);
capTex.flipY = false;                      // match glTF UV convention
capTex.colorSpace = THREE.SRGBColorSpace;
capTex.anisotropy = 8;

function drawAnswer(answer) {
  const ctx = tctx, W = 512;
  ctx.clearRect(0, 0, W, W);
  const text = answer.toUpperCase();
  // balance into up to two lines
  const words = text.split(' ');
  let lines = [text];
  if (words.length > 1 && text.length > 9) {
    let best = null;
    for (let i = 1; i < words.length; i++) {
      const a = words.slice(0, i).join(' '), b = words.slice(i).join(' ');
      const score = Math.abs(a.length - b.length);
      if (!best || score < best.score) best = { a, b, score };
    }
    lines = [best.a, best.b];
  }
  let size = lines.length > 1 ? 64 : 88;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const fit = () => {
    ctx.font = `700 ${size}px Inter, Arial, sans-serif`;
    return Math.max(...lines.map(l => ctx.measureText(l).width)) <= 225;
  };
  while (!fit() && size > 20) size -= 2;
  ctx.fillStyle = '#ffffff';
  ctx.shadowColor = 'rgba(160, 190, 255, 0.9)';
  ctx.shadowBlur = 14;
  const lh = size * 1.12;
  const y0 = 256 - ((lines.length - 1) * lh) / 2 + 30;
  lines.forEach((l, i) => ctx.fillText(l, 256, y0 + i * lh));
  capTex.needsUpdate = true;
}

/* ------------------------------------------------ load the 8-ball */
const TILT = -0.3;
const ANSWER_TIMEOUT_MS = 20_000;
let ballGroup, die, capMat, liquidMat;
let state = '8';          // '8' | 'answer'
let busy = false, bobbing = false, dieSpin = 0;
let answerTimer = null;

const overlay = document.getElementById('overlay');
const overlayText = document.getElementById('overlay-text');
const caption = document.getElementById('caption');

new GLTFLoader().load('magic8ball.glb', (gltf) => {
  ballGroup = new THREE.Group();
  const model = gltf.scene;
  ballGroup.add(model);
  scene.add(ballGroup);
  ballGroup.rotation.x = TILT;

  const mats = {
    Ball: new THREE.MeshPhysicalMaterial({
      color: 0x0c0c11, roughness: 0.16, metalness: 0,
      clearcoat: 1, clearcoatRoughness: 0.08, envMapIntensity: 1.25
    }),
    Rim: new THREE.MeshStandardMaterial({ color: 0x2c2c36, metalness: 0.85, roughness: 0.35 }),
    Liquid: new THREE.MeshPhysicalMaterial({
      color: 0x03091f, roughness: 0.38,
      clearcoat: 0.18, clearcoatRoughness: 0.55,
      emissive: 0x06164f, emissiveIntensity: 0.22, envMapIntensity: 0.10
    }),
    AnswerDie: new THREE.MeshStandardMaterial({ color: 0x1730d4, roughness: 0.5, envMapIntensity: 0.25 }),
    AnswerEdge: new THREE.MeshStandardMaterial({
      color: 0x315cff, roughness: 0.42,
      emissive: 0x102a9e, emissiveIntensity: 0.22, envMapIntensity: 0.18
    })
  };

  model.traverse(o => {
    if (!o.isMesh) return;
    // The asset ships without normals. Keep the round parts smooth, but split
    // the prism's shared vertices so its faces retain crisp, flat shading.
    if (o.name === 'AnswerDie' && o.geometry.index) {
      o.geometry = o.geometry.toNonIndexed();
    }
    o.geometry.computeVertexNormals();
    if (mats[o.name]) o.material = mats[o.name];
    o.castShadow = true;
    if (o.name === 'EightDisc') o.material.envMapIntensity = 0.15;  // keep the printed 8 crisp
    if (o.name === 'Liquid') liquidMat = o.material;
    if (o.name === 'AnswerDie') die = o;
    if (o.name === 'AnswerCap') {
      capMat = new THREE.MeshBasicMaterial({ map: capTex, transparent: true, opacity: 0, toneMapped: false });
      o.material = capMat;
    }
  });

  // Group die, raised edge, and cap so they animate together (the die sits on the model Z axis,
  // so node rotation.z spins it about its own centre)
  const cap = model.getObjectByName('AnswerCap');
  const edge = model.getObjectByName('AnswerEdge');
  die.attach(cap);
  if (edge) die.attach(edge);
  die.position.z = 0.10;              // start dunked below the liquid
  die.rotation.z = 0;

  overlay.classList.add('hidden');

  // test hook: ?auto clicks the ball automatically after load
  if (new URLSearchParams(location.search).has('auto')) setTimeout(() => ask(), 900);
}, undefined, (err) => {
  overlayText.textContent = 'Failed to load the 8-ball asset';
  console.error(err);
});

/* ------------------------------------------------ interaction */
function setCaption(text) {
  if (text) { caption.textContent = '\u201C' + text + '\u201D'; caption.classList.add('show'); }
  else caption.classList.remove('show');
}

async function shake() {
  const y0 = ballGroup.position.y;
  await tw(0.7, linear, k => {
    const d = 1 - k;
    ballGroup.rotation.z = 0.13 * d * Math.sin(k * Math.PI * 8);
    ballGroup.position.y = y0 + 0.045 * d * Math.abs(Math.sin(k * Math.PI * 10));
  });
  ballGroup.rotation.z = 0;
  ballGroup.position.y = y0;
}

async function ask() {
  if (busy || !ballGroup) return;
  clearTimeout(answerTimer);
  answerTimer = null;
  busy = true;
  bobbing = false;
  setCaption(null);

  // if an answer is showing, flip back to the "8" side first
  if (state === 'answer') {
    const rx = ballGroup.rotation.x, pz = die.position.z;
    tw(0.45, easeInOutCubic, k => {          // die sinks as the ball turns
      die.position.z = pz + (0.10 - pz) * k;
      capMat.opacity = 1 - k;
    });
    await tw(0.7, easeInOutCubic, k => { ballGroup.rotation.x = rx + Math.PI * k; });
    state = '8';
  }

  await shake();

  const answer = ANSWERS[Math.floor(Math.random() * ANSWERS.length)];
  dieSpin = (Math.random() * 24 - 12) * Math.PI / 180;

  // flip to the window side; swap the answer in mid-flip, out of sight
  const rx2 = ballGroup.rotation.x;
  const flip = tw(0.85, easeInOutCubic, k => { ballGroup.rotation.x = rx2 + Math.PI * k; });
  await tw(0.42, linear, () => {});
  drawAnswer(answer);
  die.rotation.z = dieSpin + 0.55;
  die.position.z = 0.10;
  capMat.opacity = 0;
  await flip;

  // the triangle rises from the liquid
  const rise = tw(1.0, easeOutBack, k => { die.position.z = 0.10 * (1 - k); });
  tw(1.0, easeOutCubic, k => { die.rotation.z = dieSpin + 0.55 * (1 - k); });
  tw(0.55, easeOutCubic, k => { capMat.opacity = k; }, 0.45);
  tw(0.5, easeOutCubic, k => { liquidMat.emissiveIntensity = 0.22 + 0.35 * Math.sin(k * Math.PI); });
  await rise;

  setCaption(answer);
  state = 'answer';
  bobbing = true;
  busy = false;
  answerTimer = setTimeout(returnToEight, ANSWER_TIMEOUT_MS);
}

async function returnToEight() {
  answerTimer = null;
  if (busy || state !== 'answer' || !ballGroup) return;
  busy = true;
  bobbing = false;
  setCaption(null);

  const rx = ballGroup.rotation.x;
  const pz = die.position.z;
  tw(0.45, easeInOutCubic, k => {
    die.position.z = pz + (0.10 - pz) * k;
    capMat.opacity = 1 - k;
  });
  await tw(0.7, easeInOutCubic, k => { ballGroup.rotation.x = rx + Math.PI * k; });

  state = '8';
  busy = false;
}

window.__dbg = { get state() { return state; }, get busy() { return busy; }, ask, castOnBall, tick: dt => stepTweens(dt) };

const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
function castOnBall(e) {
  pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  return ballGroup && raycaster.intersectObject(ballGroup, true).length > 0;
}
window.addEventListener('pointerdown', e => { if (castOnBall(e)) ask(); });
canvas.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    ask();
  }
});
window.addEventListener('pointermove', e => {
  canvas.style.cursor = castOnBall(e) ? 'pointer' : 'default';
  parallax.tx = (e.clientX / window.innerWidth - 0.5) * 0.22;
  parallax.ty = -(e.clientY / window.innerHeight - 0.5) * 0.14;
});

/* ------------------------------------------------ parallax & loop */
const parallax = { x: 0, y: 0, tx: 0, ty: 0 };
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;
  stepTweens(dt);

  parallax.x += (parallax.tx - parallax.x) * 0.04;
  parallax.y += (parallax.ty - parallax.y) * 0.04;
  camera.position.x = parallax.x;
  camera.position.y = CAM_Y + parallax.y;
  camera.lookAt(0, 0, 0);

  if (bobbing && die) {                       // the die floats in its liquid
    die.position.z = 0.008 * Math.sin(t * 1.8);
    die.rotation.z = dieSpin + 0.02 * Math.sin(t * 1.15);
  }

  const pos = particles.geometry.attributes.position;
  for (let i = 0; i < P; i++) {
    let y = pos.getY(i) + dt * 0.07;
    if (y > 3) y = -3;
    pos.setY(i, y);
  }
  pos.needsUpdate = true;

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
